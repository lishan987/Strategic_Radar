<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shanshan Bu Zhi | Education Information Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
  <script src="./assets/app.js" defer></script>
</head>
<body>

  <!-- Skip link (a11y) -->
  <a href="#main-content" class="skip-link">跳转到主内容</a>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"
       onclick="closeSidebar()"></div>

  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="历史期号导航">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 2L3 6v4c0 4.4 3 8.5 7 9.5 4-1 7-5.1 7-9.5V6L10 2z"
                    stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M7 10l2 2 4-4" stroke="white" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="sidebar-brand-name">Shanshan Bu Zhi</div>
        </div>
        <div class="sidebar-brand-sub">Education Information Radar</div>
      </div>
      <nav class="sidebar-nav" aria-label="期号列表">
        <div class="sidebar-section-title">历史期号</div>
        <ul class="issue-list" id="issue-list" role="list"></ul>
      </nav>
    </aside>

    <!-- Mobile top bar -->
    <div class="topbar" role="banner">
      <button class="topbar-menu-btn" id="sidebar-toggle"
              onclick="openSidebar()"
              aria-label="打开期号导航"
              aria-expanded="false"
              aria-controls="sidebar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"
             aria-hidden="true" focusable="false">
          <rect x="2" y="4" width="14" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="2" y="8.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="2" y="12.5" width="14" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </button>
      <span class="topbar-title">Shanshan Bu Zhi</span>
    </div>

    <!-- Main content -->
    <main class="main-content" id="main-content" tabindex="-1">

      <!-- Report header -->
      <header class="report-header" id="report-header">
        <div class="report-issue-badge" id="report-badge" aria-live="polite">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
               aria-hidden="true" focusable="false">
            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 4v3M6 8.5v.5" stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round"/>
          </svg>
          加载中
        </div>
        <h1 class="report-title" id="report-title">加载中…</h1>
        <div class="report-meta" id="report-date"></div>
        <p class="report-summary" id="report-summary"></p>
      </header>

      <!-- Search & filter -->
      <section class="controls" aria-label="搜索与筛选">
        <label for="search-input" class="sr-only">搜索行业情报</label>
        <input type="search" class="search-box" id="search-input"
               placeholder="搜索信息、洞察、影响分析…"
               autocomplete="off" spellcheck="false">
        <div class="filter-tabs" id="filter-tabs" role="group"
             aria-label="按分类筛选"></div>
      </section>

      <!-- Items -->
      <section id="items-container" aria-live="polite" aria-atomic="false"></section>

      <!-- Footer -->
      <footer class="report-footer" id="report-footer">
        <div class="report-footer-title">本次更新说明</div>
        <p class="report-footer-content" id="update-notes"></p>
      </footer>

    </main>
  </div>

  <!-- sr-only utility -->
  <style>
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>

</body>
</html>
